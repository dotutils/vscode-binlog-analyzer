name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        # Lint is non-blocking until an eslint config is committed.
        run: npm run lint || echo "::warning::lint not configured"
        shell: bash

      - name: Compile
        run: npm run compile

      - name: Bundle (esbuild)
        run: npm run bundle

      - name: Unit tests
        run: npm test

      - name: Package VSIX
        # Only package once on Linux to avoid duplicate artifacts.
        if: matrix.os == 'ubuntu-latest'
        run: npx vsce package --allow-missing-repository
        id: package

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: vsix
          path: '*.vsix'

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
